---
kind : PersistentVolumeClaim
apiVersion: v1
metadata:
  name: wordpress-openshift-app-database-data
  labels:
    app: wordpress-openshift-app
    app.kubernetes.io/part-of: wordpress-openshift-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # storageClassName: rbd-storagepool-cluster weggemacht sodassd auf aws laufen kann
  volumeMode: Filesystem
