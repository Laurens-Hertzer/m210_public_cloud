---
kind : PersistentVolumeClaim
apiVersion: v1
metadata:
  name: voting-app-database-data
  labels:
    app: voting-app
    app.kubernetes.io/part-of: voting-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: rbd-storagepool-cluster
  volumeMode: Filesystem


