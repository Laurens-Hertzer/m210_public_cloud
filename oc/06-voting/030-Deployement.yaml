apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: voting-app-backend
  labels:
    app: voting-app
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: voting-app-backend
  labels:
    app: voting-app
spec:
  source:
    type: Git
    git:
      uri: "https://github.com/dein-user/dein-repo.git" # Hier deine echte Git-URI eintragen
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile.backend
  output:
    to:
      kind: ImageStreamTag
      name: voting-app-backend:latest
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: voting-app-vote-frontend
  labels:
    app: voting-app
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: voting-app-vote-frontend
  labels:
    app: voting-app
spec:
  source:
    type: Git
    git:
      uri: "https://github.com/dein-user/dein-repo.git"
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile.vote-frontend
  output:
    to:
      kind: ImageStreamTag
      name: voting-app-vote-frontend:latest
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: voting-app-result-frontend
  labels:
    app: voting-app
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: voting-app-result-frontend
  labels:
    app: voting-app
spec:
  source:
    type: Git
    git:
      uri: "https://github.com/dein-user/dein-repo.git"
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile.result-frontend
  output:
    to:
      kind: ImageStreamTag
      name: voting-app-result-frontend:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voting-app-vote-database
  labels:
    app: voting-app
spec:
  replicas: 1
  selector:
    matchLabels:
      component: vote-database
  template:
    metadata:
      labels:
        component: vote-database
        app: voting-app
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom: { secretKeyRef: { name: voting-app-secrets, key: POSTGRES_DB } }
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: voting-app-secrets, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: voting-app-secrets, key: POSTGRES_PASSWORD } }
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: voting-app-database-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voting-app-backend
  labels:
    app: voting-app
spec:
  replicas: 1
  selector:
    matchLabels:
      component: backend
  template:
    metadata:
      labels:
        component: backend
        app: voting-app
    spec:
      containers:
        - name: backend
          image: voting-app-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_HOST
              value: "voting-app-vote-database"
            - name: POSTGRES_DB
              valueFrom: { secretKeyRef: { name: voting-app-secrets, key: POSTGRES_DB } }
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: voting-app-secrets, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: voting-app-secrets, key: POSTGRES_PASSWORD } }
---
