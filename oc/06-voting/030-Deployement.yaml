apiVersion: apps/v1
kind: Deployment
metadata:
  name: voting-app-pgadmin
  labels:
    app: voting-app
spec:
  replicas: 1
  selector:
    matchLabels:
      component: pgadmin
  template:
    metadata:
      labels:
        component: pgadmin
        app: voting-app
    spec:
      containers:
        - name: pgadmin
          image: ghcr.io/modul-i-ch-109/pgadmin4
          ports:
            - containerPort: 80
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              valueFrom: { secretKeyRef: { name: voting-app-secrets, key: PGADMIN_DEFAULT_EMAIL } }
            - name: PGADMIN_DEFAULT_PASSWORD
              valueFrom: { secretKeyRef: { name: voting-app-secrets, key: PGADMIN_DEFAULT_PASSWORD } }